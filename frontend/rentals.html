<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Аренда транспорта для гор | Внедорожники, байки, трансфер</title>
    <meta name="description" content="Аренда внедорожников, эндуро-байков, горных велосипедов и трансфера для путешествий по Кавказу. Лучшие цены и надежный транспорт.">
    <link rel="canonical" href="https://adventure-tours.ru/rentals.html">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><h1>🏔️ Adventure Tours</h1></a>
            </div>
            <nav class="nav">
                <a href="tours.html">Туры</a>
                <a href="guides.html">Гиды</a>
                <a href="rentals.html" class="active">Аренда</a>
                <a href="#contact">Контакты</a>
            </nav>
        </div>
    </header>

    <!-- ИЗМЕНЕНО: добавлено фоновое фото -->
    <section class="page-hero" style="background-image: linear-gradient(rgba(20,20,35,0.6), rgba(20,20,35,0.7)), url('https://images.unsplash.com/photo-1533130061792-64b345e4a833?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center;">
        <div class="container">
            <h2>Аренда транспорта</h2>
            <p>Автомобили, байки, велосипеды и трансфер для путешествий по горам</p>
        </div>
    </section>

    <section class="filters container">
        <div class="filter-group">
            <label>Тип транспорта:</label>
            <select id="filterType">
                <option value="all">Все</option>
                <option value="car">🚗 Автомобили</option>
                <option value="bike">🏍️ Байки</option>
                <option value="bicycle">🚲 Велосипеды</option>
                <option value="transfer">🚐 Трансфер</option>
            </select>
        </div>
        <button id="applyFilters" class="btn-primary">Применить</button>
    </section>

    <section class="rentals-grid container" id="rentalsContainer">
        <div class="loading">Загрузка транспорта... 🚗</div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Adventure Tours. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/rentals.js"></script>
</body>
</html>
