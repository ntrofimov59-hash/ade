<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏔️ Туры - Adventure Tours</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><h1>🏔️ Adventure Tours</h1></a>
            </div>
            <nav class="nav">
                <a href="tours.html" class="active">Туры</a>
                <a href="guides.html">Гиды</a>
                <a href="rentals.html">Аренда</a>
                <a href="#contact">Контакты</a>
            </nav>
        </div>
    </header>

    <section class="page-hero">
        <div class="container">
            <h2>Наши туры</h2>
            <p>Выбери приключение своей мечты</p>
        </div>
    </section>

    <section class="filters container">
        <div class="filter-group">
            <label>Тип тура:</label>
            <select id="filterType">
                <option value="all">Все</option>
                <option value="climbing">Восхождения</option>
                <option value="gastro">Гастрономия</option>
                <option value="trekking">Треккинг</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Цена до:</label>
            <input type="number" id="filterPrice" placeholder="Например: 30000">
        </div>
        <button id="applyFilters" class="btn-primary">Применить</button>
    </section>

    <section class="tours-grid container" id="toursContainer">
        <!-- Карточки будут загружены через JavaScript -->
        <div class="loading">Загрузка туров... 🏔️</div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Adventure Tours. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/tours.js"></script>
</body>
</html>
